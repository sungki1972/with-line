<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L자형 조명 시뮬레이터</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 24px 0 8px;
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 2px;
    }

    .controls {
      display: flex;
      gap: 32px;
      align-items: center;
      margin: 16px 0 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .input-group label {
      font-size: 0.85rem;
      color: #aaa;
      letter-spacing: 1px;
    }

    .input-group input[type="number"] {
      width: 120px;
      padding: 8px 12px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #2a2a3e;
      color: #fff;
      font-size: 1.1rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input[type="number"]:focus {
      border-color: #ffd78a;
    }

    .input-group input[type="range"] {
      width: 160px;
      accent-color: #ffd78a;
    }

    .unit {
      font-size: 0.8rem;
      color: #888;
    }

    .canvas-wrapper {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    canvas {
      display: block;
      max-width: 95vw;
      height: auto;
    }

    .length-labels {
      display: flex;
      gap: 40px;
      margin-top: 16px;
    }

    .length-label {
      background: rgba(255,215,138,0.15);
      border: 1px solid rgba(255,215,138,0.3);
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 0.95rem;
      color: #ffd78a;
      min-width: 140px;
      text-align: center;
    }

    .info {
      margin: 20px 0 32px;
      color: #666;
      font-size: 0.8rem;
      text-align: center;
      line-height: 1.6;
    }

    .presets {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .preset-btn {
      padding: 6px 16px;
      border: 1px solid #444;
      border-radius: 20px;
      background: transparent;
      color: #ccc;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .preset-btn:hover {
      border-color: #ffd78a;
      color: #ffd78a;
    }

    .preset-btn.active {
      background: rgba(255,215,138,0.2);
      border-color: #ffd78a;
      color: #ffd78a;
    }
  </style>
</head>
<body>

  <h1>L자형 조명 시뮬레이터</h1>


  <div class="controls">
    <div class="input-group">
      <label>왼쪽 조명 길이</label>
      <input type="range" id="leftSlider" value="1200" min="200" max="3000" step="50">
      <input type="number" id="leftLen" value="1200" min="200" max="3000" step="50">
      <span class="unit">mm</span>
    </div>
    <div class="input-group">
      <label>오른쪽 조명 길이</label>
      <input type="range" id="rightSlider" value="800" min="200" max="3000" step="50">
      <input type="number" id="rightLen" value="800" min="200" max="3000" step="50">
      <span class="unit">mm</span>
    </div>
  </div>

  <div class="canvas-wrapper">
    <canvas id="canvas"></canvas>
  </div>

  <div class="length-labels">
    <span class="length-label" id="labelLeft">왼쪽: 1200mm</span>
    <span class="length-label" id="labelRight">오른쪽: 800mm</span>
  </div>

  <p class="info">
    조명 길이를 입력하면 ㄱ자형 천장 조명의 빛 길이가 실시간으로 변경됩니다.<br>
    범위: 200mm ~ 3000mm
  </p>

  <p style="margin: 0 0 32px; color: #ffd78a; font-size: 1.1rem; letter-spacing: 2px; text-align: center;">
    제일전기조명(WITH)
  </p>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const leftInput = document.getElementById('leftLen');
    const rightInput = document.getElementById('rightLen');
    const leftSlider = document.getElementById('leftSlider');
    const rightSlider = document.getElementById('rightSlider');
    const labelLeft = document.getElementById('labelLeft');
    const labelRight = document.getElementById('labelRight');

    const bgImage = new Image();
    bgImage.src = '11.49.png';

    // ──────────────────────────────────────────────
    // 이미지 밝은 픽셀 분석 결과 기반 좌표 (원본 1536x1024)
    //
    // ㄱ자 꺾이는 점 (코너):  약 (921, 309)
    // 왼쪽 팔 끝 (짧을 때):   약 (460, 125)
    // 오른쪽 팔 끝 (길 때):   약 (1228, 228)
    //
    // 캔버스 스케일: 800/1536 ≈ 0.5208
    // ──────────────────────────────────────────────

    const MAX_MM = 3000;

    // 원본 좌표 → 캔버스 비율로 변환
    const ORIG_W = 1536;
    const ORIG_H = 1024;

    // 코너 좌표 (원본 기준)
    const CORNER_ORIG = { x: 765, y: 309 };

    // 왼쪽 팔: 코너에서 왼쪽 위로 (방향 벡터)
    // (460,125) → (921,309): 차이 = (461, 184)
    // 코너에서 왼쪽 팔 끝을 향한 방향: (-461, -184)
    const LEFT_DIR_X = -461;
    const LEFT_DIR_Y = -184;
    const LEFT_DIR_LEN = Math.sqrt(LEFT_DIR_X * LEFT_DIR_X + LEFT_DIR_Y * LEFT_DIR_Y);
    // 정규화
    const LEFT_NX = LEFT_DIR_X / LEFT_DIR_LEN;
    const LEFT_NY = LEFT_DIR_Y / LEFT_DIR_LEN;

    // 오른쪽 팔: 코너에서 오른쪽 위로 (방향 벡터)
    // (921,309) → (1228,228): 차이 = (307, -81)
    const RIGHT_DIR_X = 307;
    const RIGHT_DIR_Y = -81;
    const RIGHT_DIR_LEN = Math.sqrt(RIGHT_DIR_X * RIGHT_DIR_X + RIGHT_DIR_Y * RIGHT_DIR_Y);
    const RIGHT_NX = RIGHT_DIR_X / RIGHT_DIR_LEN;
    const RIGHT_NY = RIGHT_DIR_Y / RIGHT_DIR_LEN;

    // 최대 팔 길이 (px, 원본 기준) - 양쪽 동일하게 설정
    const MAX_LEFT_PX = 800;   // 3000mm일 때 원본 px
    const MAX_RIGHT_PX = 800;  // 3000mm일 때 원본 px (양쪽 동일)

    let scale = 1;

    bgImage.onload = function() {
      // 캔버스를 이미지 비율에 맞춤 (800px 너비 기준)
      canvas.width = 800;
      canvas.height = Math.round(800 * (ORIG_H / ORIG_W));
      scale = canvas.width / ORIG_W;
      updateLighting();
    };

    // 조명 라인 그리기 (glow 없이 선명한 실선)
    function drawLightLine(x1, y1, x2, y2) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = 'rgba(255, 245, 220, 1)';
      ctx.lineWidth = 6 * scale;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    function updateLighting() {
      if (!bgImage.complete) return;

      const leftMM = Math.max(200, Math.min(3000, parseInt(leftInput.value) || 200));
      const rightMM = Math.max(200, Math.min(3000, parseInt(rightInput.value) || 200));

      const cw = canvas.width;
      const ch = canvas.height;

      // 1) 배경 이미지
      ctx.clearRect(0, 0, cw, ch);
      ctx.drawImage(bgImage, 0, 0, cw, ch);

      // 2) 배경을 살짝 어둡게 (조명 강조)
      ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
      ctx.fillRect(0, 0, cw, ch);

      // 3) 코너 좌표 (캔버스)
      const cx = CORNER_ORIG.x * scale;
      const cy = CORNER_ORIG.y * scale;

      // 4) mm → 픽셀 길이 변환
      const leftPx = (leftMM / MAX_MM) * MAX_LEFT_PX * scale;
      const rightPx = (rightMM / MAX_MM) * MAX_RIGHT_PX * scale;

      // 5) 왼쪽 팔 끝점 (코너에서 왼쪽 위 방향)
      const leftEndX = cx + LEFT_NX * leftPx;
      const leftEndY = cy + LEFT_NY * leftPx;

      // 6) 오른쪽 팔 끝점 (코너에서 오른쪽 위 방향)
      const rightEndX = cx + RIGHT_NX * rightPx;
      const rightEndY = cy + RIGHT_NY * rightPx;

      // 7) 조명 그리기 (선명한 실선)
      drawLightLine(leftEndX, leftEndY, cx, cy);
      drawLightLine(cx, cy, rightEndX, rightEndY);

      // 라벨 업데이트
      labelLeft.textContent = `왼쪽: ${leftMM}mm`;
      labelRight.textContent = `오른쪽: ${rightMM}mm`;
    }

    // 입력 이벤트
    leftInput.addEventListener('input', () => {
      leftSlider.value = leftInput.value;
      updateLighting();
    });
    rightInput.addEventListener('input', () => {
      rightSlider.value = rightInput.value;
      updateLighting();
    });
    leftSlider.addEventListener('input', () => {
      leftInput.value = leftSlider.value;
      updateLighting();
    });
    rightSlider.addEventListener('input', () => {
      rightInput.value = rightSlider.value;
      updateLighting();
    });

    // 프리셋 버튼
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        leftInput.value = btn.dataset.left;
        rightInput.value = btn.dataset.right;
        leftSlider.value = btn.dataset.left;
        rightSlider.value = btn.dataset.right;
        updateLighting();

        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  </script>

</body>
</html>
